<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>آب‌یار | مدیریت مصرف آب</title>

<!-- PWA: manifesto و تم -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1fb6ff">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Tahoma, Arial, sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #0f5fa6, #1fb6ff);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.app {
  width: 100%;
  max-width: 420px;
  background: #ffffff;
  border-radius: 26px;
  padding: 26px 24px 28px;
  box-shadow: 0 30px 60px rgba(0,0,0,0.25);
  position: relative;
  overflow: hidden;
}

.app::before {
  content: "";
  position: absolute;
  top: -70px;
  right: -70px;
  width: 180px;
  height: 180px;
  background: radial-gradient(circle, #a8e7ff, #4fc3ff);
  border-radius: 50%;
  opacity: 0.35;
}

.header {
  text-align: center;
  margin-bottom: 22px;
}

.logo {
  font-size: 38px;
  margin-bottom: 6px;
}

.title {
  font-size: 28px;
  font-weight: bold;
  color: #0b3c5d;
}

.subtitle {
  font-size: 14px;
  color: #5b7a8f;
  margin-top: 6px;
}

.label {
  display: block;
  margin: 18px 0 10px;
  font-weight: bold;
  color: #0b3c5d;
}

input {
  width: 100%;
  padding: 14px 16px;
  border-radius: 16px;
  border: 2px solid #d4ecff;
  font-size: 16px;
  outline: none;
  background: #f8fcff;
  transition: 0.25s;
}

input:focus {
  border-color: #1fb6ff;
  box-shadow: 0 0 0 4px rgba(31,182,255,0.18);
  background: white;
}

.unit {
  margin-top: 6px;
  font-size: 13px;
  color: #6a879a;
}

button {
  width: 100%;
  margin-top: 18px;
  padding: 15px;
  font-size: 16px;
  font-weight: bold;
  color: white;
  background: linear-gradient(135deg, #1fb6ff, #1488cc);
  border: none;
  border-radius: 18px;
  cursor: pointer;
  box-shadow: 0 14px 28px rgba(31,182,255,0.35);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 18px 34px rgba(31,182,255,0.45);
}

.result {
  display: none;
  margin-top: 20px;
  padding: 18px;
  border-radius: 18px;
  background: linear-gradient(135deg, #eef9ff, #d8f0ff);
  color: #0b3c5d;
  line-height: 2;
}

.result strong {
  color: #0077b6;
  font-size: 18px;
}

.tips {
  display: none;
  margin-top: 16px;
  padding: 16px;
  border-radius: 18px;
  background: #f9fdff;
  border: 1px solid #d9eefb;
}

.tips h3 {
  margin-top: 0;
  color: #0b3c5d;
}

.tips ul {
  margin: 0;
  padding-right: 18px;
  color: #4b6a80;
  line-height: 1.9;
}

.footer {
  margin-top: 18px;
  text-align: center;
  font-size: 12px;
  color: #6a879a;
}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">💧</div>
    <div class="title">آب‌یار</div>
    <div class="subtitle">یار مهربان شما در صرفه‌جویی آب</div>
  </div>

  <label class="label">مصرف روزانه آب</label>
  <input type="number" id="waterInput" placeholder="مثلاً 250">
  <div class="unit">مقدار را به لیتر وارد کنید</div>

  <button onclick="calc()">محاسبه صرفه‌جویی</button>

  <div class="result" id="result"></div>
  <div class="tips" id="tips"></div>

  <div class="footer">هر قطره آب ارزشمند است 🌍</div>
</div>

<script>
function calc() {
  let water = Number(document.getElementById("waterInput").value);
  let result = document.getElementById("result");
  let tips = document.getElementById("tips");

  if (!water || water <= 0) {
    result.style.display = "block";
    tips.style.display = "none";
    result.innerHTML = "⚠ لطفاً یک عدد معتبر وارد کنید.";
    return;
  }

  let daily = water * 0.2;
  let monthly = daily * 30;

  result.style.display = "block";
  tips.style.display = "block";

  result.innerHTML =
    "✅ اگر فقط <strong>۲۰٪</strong> صرفه‌جویی کنید:<br>" +
    "💦 روزانه: <strong>" + daily.toFixed(1) + "</strong> لیتر<br>" +
    "📅 ماهانه: <strong>" + monthly.toFixed(1) + "</strong> لیتر";
tips.innerHTML =
    "<h3>پیشنهادهای آب‌یار</h3>" +
    "<ul>" +
    "<li>شیر آب را هنگام مسواک زدن ببند.</li>" +
    "<li>مدت دوش گرفتن را کوتاه‌تر کن.</li>" +
    "<li>نشتی‌ها را سریع تعمیر کن.</li>" +
    "<li>آبیاری را صبح زود انجام بده.</li>" +
    "</ul>";
}

// ثبت Service Worker برای تبدیل شدن به PWA قابل نصب
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
    .then(reg => console.log('Service Worker registered:', reg))
    .catch(err => console.error('Service Worker registration failed:', err));
}
</script>
</body>
</html>
